<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">RewardOps Defender architecture</title>
  <desc id="desc">Read-only evidence flows into DFIR triage and agent-defense scoring, then produces traceable reports for analyst review.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .lane { fill: #ffffff; stroke: #cfd6e4; stroke-width: 2; }
      .box { fill: #ffffff; stroke: #2d3a4f; stroke-width: 2; rx: 10; }
      .box2 { fill: #eef6ff; stroke: #245b9d; stroke-width: 2; rx: 10; }
      .box3 { fill: #fff4e6; stroke: #98620f; stroke-width: 2; rx: 10; }
      .gate { fill: #eefaf2; stroke: #1d7d43; stroke-width: 2; rx: 10; }
      .text { font-family: Arial, Helvetica, sans-serif; font-size: 20px; fill: #182230; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #334155; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 17px; fill: #0f172a; font-weight: 700; }
      .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .safe { fill: #1d7d43; }
      .warn { fill: #98620f; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1280" height="720"/>
  <text class="text" x="54" y="56" style="font-size:30px;font-weight:700">RewardOps Defender</text>
  <text class="small" x="54" y="84">Local read-only FIND EVIL demo: traceable DFIR triage plus hostile-agent sequence defense</text>

  <rect class="lane" x="44" y="120" width="1192" height="230" rx="18"/>
  <text class="label" x="70" y="154">DFIR evidence path</text>
  <rect class="box" x="78" y="188" width="210" height="90"/>
  <text class="text" x="102" y="226">Sanitized</text>
  <text class="small" x="102" y="252">JSONL case events</text>
  <rect class="box2" x="348" y="188" width="220" height="90"/>
  <text class="text" x="374" y="226">Read-only</text>
  <text class="small" x="374" y="252">JSON-RPC wrapper</text>
  <rect class="box2" x="628" y="188" width="220" height="90"/>
  <text class="text" x="654" y="226">Triage engine</text>
  <text class="small" x="654" y="252">rules + validation</text>
  <rect class="gate" x="908" y="188" width="240" height="90"/>
  <text class="text" x="934" y="226">Reports</text>
  <text class="small" x="934" y="252">JSON, Markdown, hashes</text>
  <path class="arrow" d="M 288 233 H 342"/>
  <path class="arrow" d="M 568 233 H 622"/>
  <path class="arrow" d="M 848 233 H 902"/>

  <rect class="lane" x="44" y="390" width="1192" height="230" rx="18"/>
  <text class="label" x="70" y="424">Agent-defense path</text>
  <rect class="box" x="78" y="458" width="210" height="90"/>
  <text class="text" x="102" y="496">Agent events</text>
  <text class="small" x="102" y="522">tool, wallet, endpoint</text>
  <rect class="box3" x="348" y="458" width="220" height="90"/>
  <text class="text" x="374" y="496">Sequence scorer</text>
  <text class="small" x="374" y="522">signals + corrections</text>
  <rect class="box3" x="628" y="458" width="220" height="90"/>
  <text class="text" x="654" y="496">Hypotheses</text>
  <text class="small" x="654" y="522">abuse, theft, exfil</text>
  <rect class="gate" x="908" y="458" width="240" height="90"/>
  <text class="text" x="934" y="496">Approval gate</text>
  <text class="small" x="934" y="522">containment before action</text>
  <path class="arrow" d="M 288 503 H 342"/>
  <path class="arrow" d="M 568 503 H 622"/>
  <path class="arrow" d="M 848 503 H 902"/>

  <text class="small safe" x="76" y="658">No live probing. No credential use. No wallet signing. No destructive remediation.</text>
  <text class="small warn" x="76" y="684">External account creation, public repo publishing, video upload, and Devpost submission require fresh approval.</text>
</svg>
